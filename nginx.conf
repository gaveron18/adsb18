server {
    listen 8098;

    # config.js — no-cache so changes apply immediately
    location = /config.js {
        root /home/new/adsb18/frontend;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # archive.html — no-cache to avoid stale page after updates
    location = /archive.html {
        root /home/new/adsb18/frontend;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Globe history (date picker traces) — FastAPI
    location ^~ /globe_history/ {
        proxy_pass http://127.0.0.1:9001/globe_history/;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache";
    }

    # Chunks from Pi tunnel (tar1090 sidebar history)
    location ^~ /chunks/ {
        proxy_pass http://127.0.0.1:30092/tar1090/chunks/;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache";
    }

    # upintheair.json stub (tar1090 requests this)
    location = /upintheair.json {
        return 204;
    }

    # history_ files from Pi (tar1090 legacy history) — must be before /data/
    location ^~ /data/history_ {
        proxy_pass http://127.0.0.1:30092/tar1090/data/history_;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache";
    }

    location ^~ /data/ {
        proxy_pass http://127.0.0.1:9001/data/;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache";
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:9001/api/;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
        gzip off;
    }

    location ^~ /ws {
        proxy_pass http://127.0.0.1:9001/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /db2/ {
        proxy_pass http://127.0.0.1:30092/tar1090/db-c9f8280/;
        add_header Cache-Control "public, max-age=86400";
    }

    location ~* \.json$ {
        root /home/new/adsb18/frontend;
        try_files $uri =404;
    }

    location ~* \.docx$ {
        root /home/new/adsb18/frontend;
        add_header Content-Disposition 'attachment; filename="KTA_aerodroma.docx"';
    }

    location / {
        root /home/new/adsb18/frontend;
        index index.html;
        gzip_static on;
        max_ranges 0;
        try_files $uri $uri/ /index.html;
    }
}
