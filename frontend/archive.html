<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adsb18 вҖ” РҗСҖС…РёРІ РҝРҫР»С‘СӮРҫРІ</title>
    <link rel="stylesheet" href="libs/leaflet/leaflet.css"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .topbar {
            background: #16213e;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
            z-index: 100;
        }
        .topbar h1 { font-size: 16px; color: #4fc3f7; white-space: nowrap; }
        .topbar a { color: #4fc3f7; text-decoration: none; font-size: 13px; }
        .topbar a:hover { text-decoration: underline; }

        .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex: 1; }
        .filter-row label { font-size: 12px; color: #aaa; white-space: nowrap; }
        .filter-row input[type="datetime-local"] {
            background: #0f3460; border: 1px solid #4fc3f7; color: #e0e0e0;
            border-radius: 4px; padding: 5px 8px; font-size: 12px;
        }
        .btn {
            background: #4fc3f7; color: #1a1a2e; border: none;
            border-radius: 4px; padding: 6px 14px; font-size: 13px;
            font-weight: bold; cursor: pointer; white-space: nowrap;
        }
        .btn:hover { background: #81d4fa; }
        .btn-outline {
            background: transparent; border: 1px solid #4fc3f7; color: #4fc3f7;
        }
        .btn-outline:hover { background: #0f3460; }
        .btn-sm {
            padding: 3px 8px; font-size: 11px; border-radius: 3px;
        }

        .tz-row { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .tz-row label { font-size: 12px; color: #aaa; }
        .tz-select {
            background: #0f3460; border: 1px solid #4fc3f7; color: #e0e0e0;
            border-radius: 4px; padding: 4px 6px; font-size: 12px; cursor: pointer;
            max-width: 160px;
        }
        .tz-select:focus { outline: none; }
        .btn-icon {
            background: transparent; border: 1px solid #4fc3f7; color: #4fc3f7;
            border-radius: 4px; padding: 3px 7px; font-size: 14px; cursor: pointer;
            line-height: 1;
        }
        .btn-icon:hover { background: #0f3460; }

        .main { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 320px; min-width: 240px; background: #16213e;
            border-right: 1px solid #0f3460; display: flex;
            flex-direction: column; overflow: hidden;
        }
        .sidebar-header {
            padding: 6px 10px; background: #0f3460; font-size: 12px;
            color: #aaa; display: flex; justify-content: space-between;
            align-items: center; flex-shrink: 0; gap: 6px;
        }
        .sidebar-header b { color: #4fc3f7; }
        .sidebar-actions { display: flex; gap: 4px; }

        .search-box {
            padding: 6px 8px; border-bottom: 1px solid #0f3460; flex-shrink: 0;
        }
        .search-box input {
            width: 100%; background: #0f3460; border: 1px solid #1a4a7a;
            color: #e0e0e0; border-radius: 4px; padding: 5px 8px;
            font-size: 12px; outline: none;
        }
        .search-box input:focus { border-color: #4fc3f7; }

        .flight-list { flex: 1; overflow-y: auto; }
        .flight-list::-webkit-scrollbar { width: 4px; }
        .flight-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

        .flight-item {
            padding: 8px 10px; border-bottom: 1px solid #0f3460;
            cursor: pointer; transition: background 0.1s;
            display: flex; align-items: flex-start; gap: 8px;
        }
        .flight-item:hover { background: #1a2e4a; }
        .flight-item.active { background: #1a3a5e; }

        .fi-check {
            margin-top: 3px; flex-shrink: 0;
            width: 14px; height: 14px; cursor: pointer;
            accent-color: #4fc3f7;
        }
        .fi-color {
            width: 4px; border-radius: 2px; align-self: stretch;
            flex-shrink: 0; min-height: 40px;
        }
        .fi-body { flex: 1; min-width: 0; }
        .fi-icao { font-size: 13px; font-weight: bold; color: #4fc3f7; font-family: monospace; }
        .fi-time { font-size: 11px; color: #888; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fi-time-sep { color: #555; }
        .fi-time-end { color: #aaa; }

        .map-wrap { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(22,33,62,0.95); border: 1px solid #0f3460;
            border-radius: 6px; padding: 12px 14px; min-width: 210px;
            font-size: 12px; display: none; box-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        .info-panel h3 { font-size: 15px; margin-bottom: 8px; }
        .info-panel table { width: 100%; border-collapse: collapse; }
        .info-panel td { padding: 3px 0; }
        .info-panel td:first-child { color: #666; width: 100px; }
        .info-panel td:last-child { color: #ddd; font-weight: bold; }

        .empty { padding: 24px 12px; text-align: center; color: #555; font-size: 13px; line-height: 1.8; }
        .loading { color: #4fc3f7 !important; }

        .leaflet-tooltip {
            background: #16213e !important; border: 1px solid #4fc3f7 !important;
            color: #ddd !important; font-size: 11px !important; white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>вңҲ РҗСҖС…РёРІ РҝРҫР»С‘СӮРҫРІ</h1>
    <a href="/">вҶҗ Live РәР°СҖСӮР°</a>
    <div class="filter-row">
        <label>РЎ</label>
        <input type="datetime-local" id="fromDt">
        <label>РҹРҫ</label>
        <input type="datetime-local" id="toDt">
        <button class="btn" onclick="loadArchive()">Р—Р°РіСҖСғР·РёСӮСҢ</button>
    </div>
    <div class="tz-row">
        <label>рҹ•’</label>
        <select class="tz-select" id="tzSelect" onchange="onTZChange()"></select>
        <button class="btn-icon" title="Р”РҫРұР°РІРёСӮСҢ СҮР°СҒРҫРІРҫР№ РҝРҫСҸСҒ" onclick="addCustomTZ()">+</button>
        <button class="btn-icon" id="tzRemoveBtn" title="РЈРҙР°Р»РёСӮСҢ" onclick="removeCustomTZ()" style="display:none">вң•</button>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-header">
            <span>Р РөР№СҒРҫРІ: <b id="flightCount">вҖ”</b></span>
            <div class="sidebar-actions">
                <button class="btn btn-outline btn-sm" onclick="selectVisible()">Р’СҒРө</button>
                <button class="btn btn-outline btn-sm" onclick="clearAll()">РЎРҪСҸСӮСҢ</button>
            </div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="РҹРҫРёСҒРә РҝРҫ СҖРөР№СҒСғ РёР»Рё ICAOвҖҰ" oninput="filterFlights()">
        </div>
        <div class="flight-list" id="flightList">
            <div class="empty">Р’СӢРұРөСҖРёСӮРө РҝРөСҖРёРҫРҙ Рё РҪР°Р¶РјРёСӮРө В«Р—Р°РіСҖСғР·РёСӮСҢВ»</div>
        </div>
    </div>

    <div class="map-wrap">
        <div id="map"></div>

        <div class="info-panel" id="infoPanel">
            <h3 id="ipCallsign" style="color:#4fc3f7">вҖ”</h3>
            <table>
                <tr><td>ICAO</td><td id="ipIcao">вҖ”</td></tr>
                <tr><td>РқР°СҮР°Р»Рҫ</td><td id="ipFrom">вҖ”</td></tr>
                <tr><td>РҡРҫРҪРөСҶ</td><td id="ipTo">вҖ”</td></tr>
                <tr><td>Р”Р»РёСӮРөР»СҢРҪРҫСҒСӮСҢ</td><td id="ipDur">вҖ”</td></tr>
                <tr><td>РўРҫСҮРөРә</td><td id="ipPts">вҖ”</td></tr>
                <tr><td>РңР°РәСҒ. РІСӢСҒРҫСӮР°</td><td id="ipAlt">вҖ”</td></tr>
                <tr><td>РңР°РәСҒ. СҒРәРҫСҖРҫСҒСӮСҢ</td><td id="ipSpd">вҖ”</td></tr>
            </table>
        </div>
    </div>
</div>

<script src="libs/leaflet/leaflet.js"></script>
<script>
// в”Җв”Җ Map в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
delete L.Icon.Default.prototype._getIconUrl;
L.Icon.Default.mergeOptions({
    iconUrl: 'libs/leaflet/marker-icon.png', shadowUrl: 'libs/leaflet/marker-shadow.png',
    iconRetinaUrl: 'libs/leaflet/marker-icon.png',
});

const map = L.map('map').setView([57.914, 56.218], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'В© OpenStreetMap', maxZoom: 18
}).addTo(map);

// в”Җв”Җ Track colors в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const COLORS = [
    '#4fc3f7','#ff6b6b','#51cf66','#ffd43b','#cc5de8',
    '#ff922b','#20c997','#f06595','#74c0fc','#a9e34b',
    '#f783ac','#63e6be','#ffa94d','#e599f7','#66d9e8',
];
let colorIdx = 0;
function nextColor() { return COLORS[colorIdx++ % COLORS.length]; }

// в”Җв”Җ State в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// activeTracks: icao вҶ’ { layer, color, f, el }
const activeTracks = new Map();
let allFlights = [];

// в”Җв”Җ Timezone в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TZ_PRESETS = [
    { name: 'UTC',             offset: 0 },
    { name: 'РҳР¶РөРІСҒРә (UTC+4)',  offset: 4 },
    { name: 'РҹРөСҖРјСҢ (UTC+5)',   offset: 5 },
];
const LS_KEY = 'adsb18_tz';

let tzOffsetMs = 0;   // current offset in milliseconds
let tzLabel    = 'UTC';

function loadTZState() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function saveTZState(s) { localStorage.setItem(LS_KEY, JSON.stringify(s)); }

function buildTZSelect() {
    const sel   = document.getElementById('tzSelect');
    const state = loadTZState();
    const custom = state.custom || [];
    sel.innerHTML = '';
    [...TZ_PRESETS, ...custom].forEach((tz, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = tz.name;
        sel.appendChild(opt);
    });
    // Restore saved selection
    const saved = state.selected ?? 0;
    sel.value = (saved < sel.options.length) ? saved : 0;
    applyTZFromSelect();
}

function applyTZFromSelect() {
    const sel    = document.getElementById('tzSelect');
    const idx    = parseInt(sel.value) || 0;
    const state  = loadTZState();
    const custom = state.custom || [];
    const all    = [...TZ_PRESETS, ...custom];
    const tz     = all[idx] || TZ_PRESETS[0];
    tzOffsetMs   = tz.offset * 3600000;
    tzLabel      = tz.name;
    // Show remove button only for custom entries
    const isCustom = idx >= TZ_PRESETS.length;
    document.getElementById('tzRemoveBtn').style.display = isCustom ? '' : 'none';
    // Save selection
    state.selected = idx;
    saveTZState(state);
}

function onTZChange() {
    applyTZFromSelect();
    refreshDisplayedTimes();
    initDatePickers();
}

function addCustomTZ() {
    const name = prompt('РқР°Р·РІР°РҪРёРө СҮР°СҒРҫРІРҫРіРҫ РҝРҫСҸСҒР° (РҪР°РҝСҖРёРјРөСҖ: РңРҫСҒРәРІР°)');
    if (!name) return;
    const off = parseFloat(prompt('РЎРјРөСүРөРҪРёРө UTC (РҪР°РҝСҖРёРјРөСҖ: 3 РҙР»СҸ UTC+3)'));
    if (isNaN(off)) return;
    const state  = loadTZState();
    state.custom = state.custom || [];
    state.custom.push({ name: `${name} (UTC+${off})`, offset: off });
    saveTZState(state);
    buildTZSelect();
    // Select the newly added entry
    const sel = document.getElementById('tzSelect');
    sel.value = TZ_PRESETS.length + state.custom.length - 1;
    onTZChange();
}

function removeCustomTZ() {
    const sel    = document.getElementById('tzSelect');
    const idx    = parseInt(sel.value);
    const customIdx = idx - TZ_PRESETS.length;
    if (customIdx < 0) return;
    if (!confirm(`РЈРҙР°Р»РёСӮСҢ "${sel.options[idx].textContent}"?`)) return;
    const state  = loadTZState();
    state.custom.splice(customIdx, 1);
    state.selected = 0;
    saveTZState(state);
    buildTZSelect();
    onTZChange();
}

// в”Җв”Җ Time helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function fmtTime(iso) {
    if (!iso) return 'вҖ”';
    const d = new Date(new Date(iso).getTime() + tzOffsetMs);
    const s = d.toISOString();
    const day  = s.slice(8, 10) + '.' + s.slice(5, 7); // DD.MM
    const time = s.slice(11, 16);                        // HH:MM
    return day + ' ' + time;
}

// Р”РёР°РҝР°Р·РҫРҪ: "26.03 12:32 вҶ’ 12:49" (РәРҫРҪРөСҮРҪР°СҸ РҙР°СӮР° СӮРҫР»СҢРәРҫ РөСҒР»Рё РҫСӮР»РёСҮР°РөСӮСҒСҸ)
// РЎРҝРёСҒРҫРә СҖРөР№СҒРҫРІ РІСҒРөРіРҙР° РІ UTC
function fmtTimeRange(isoFrom, isoTo) {
    if (!isoFrom) return 'вҖ”';
    const fs = new Date(isoFrom).toISOString();
    const dayFrom  = fs.slice(8, 10) + '.' + fs.slice(5, 7);
    const timeFrom = fs.slice(11, 16);
    if (!isoTo) return dayFrom + ' ' + timeFrom + ' UTC';
    const ts = new Date(isoTo).toISOString();
    const dayTo  = ts.slice(8, 10) + '.' + ts.slice(5, 7);
    const timeTo = ts.slice(11, 16);
    const end = dayFrom === dayTo ? timeTo : dayTo + ' ' + timeTo;
    return dayFrom + ' ' + timeFrom + ' вҶ’ ' + end + ' UTC';
}

// datetime-local input value вҶ’ UTC ISO (input is in selected TZ)
function inputToUTC(s) {
    if (!s) return '';
    const [date, time = '00:00'] = s.split('T');
    const [y, mo, d] = date.split('-').map(Number);
    const [h, mi]    = time.split(':').map(Number);
    return new Date(Date.UTC(y, mo - 1, d, h, mi) - tzOffsetMs).toISOString();
}

// UTC ISO вҶ’ datetime-local value in selected TZ
function utcToInput(iso) {
    const d = new Date(new Date(iso).getTime() + tzOffsetMs);
    return d.toISOString().slice(0, 16);
}

function fmtDur(a, b) {
    const ms = new Date(b) - new Date(a);
    const h  = Math.floor(ms / 3600000);
    const m  = Math.floor((ms % 3600000) / 60000);
    return h > 0 ? `${h}СҮ ${m}Рј` : `${m}Рј`;
}
function ft2m(ft) { return ft ? Math.round(ft / 3.281) + ' Рј' : 'вҖ”'; }

// в”Җв”Җ Date pickers: today 00:00 вҶ’ now in selected TZ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function initDatePickers() {
    const nowUTC  = new Date().toISOString();
    const nowInTZ = new Date(Date.now() + tzOffsetMs);
    const startOfDayUTC = new Date(Date.UTC(
        nowInTZ.getUTCFullYear(), nowInTZ.getUTCMonth(), nowInTZ.getUTCDate()
    ) - tzOffsetMs).toISOString();
    document.getElementById('fromDt').value = utcToInput(startOfDayUTC);
    document.getElementById('toDt').value   = utcToInput(nowUTC);
}

// Refresh times in already-rendered flight list (after TZ change)
function refreshDisplayedTimes() {
    document.querySelectorAll('.flight-item[data-first]').forEach(el => {
        const timeEl = el.querySelector('.fi-time');
        if (timeEl) timeEl.textContent = fmtTimeRange(el.dataset.first, el.dataset.last);
    });
    // Refresh info panel if visible
    if (document.getElementById('infoPanel').style.display !== 'none') {
        const icao = document.getElementById('ipIcao').textContent;
        const t = activeTracks.get(icao);
        if (t) showInfo(t.f, t.color);
    }
}

// в”Җв”Җ Init в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
buildTZSelect();
initDatePickers();
loadArchive(true);

// в”Җв”Җ Load flight list в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadArchive(autoSelect = false) {
    const from = inputToUTC(document.getElementById('fromDt').value);
    const to   = inputToUTC(document.getElementById('toDt').value);
    if (!from || !to) { alert('Р’СӢРұРөСҖРёСӮРө РҝРөСҖРёРҫРҙ'); return; }

    clearAll();
    colorIdx = 0;
    allFlights = [];

    const list = document.getElementById('flightList');
    list.innerHTML = '<div class="empty loading">вҸі Р—Р°РіСҖСғР·РәР°...</div>';
    document.getElementById('flightCount').textContent = '...';

    try {
        const r = await fetch(`/api/archive?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
        allFlights = await r.json();
        document.getElementById('flightCount').textContent = allFlights.length;
        document.getElementById('searchInput').value = '';

        if (!allFlights.length) {
            list.innerHTML = '<div class="empty">РқРөСӮ РҙР°РҪРҪСӢС… Р·Р° РІСӢРұСҖР°РҪРҪСӢР№ РҝРөСҖРёРҫРҙ</div>';
            return;
        }

        list.innerHTML = '';
        allFlights.forEach(f => buildFlightItem(f, list));
        if (autoSelect) selectVisible();
    } catch(e) {
        list.innerHTML = `<div class="empty">РһСҲРёРұРәР°: ${e.message}</div>`;
    }
}

function buildFlightItem(f, container) {
    const color = nextColor();
    const el    = document.createElement('div');
    el.className = 'flight-item';
    el.dataset.callsign = (f.callsign || '').trim().toUpperCase();
    el.dataset.icao     = (f.icao || '').toUpperCase();
    el.dataset.color    = color;
    el.dataset.first    = f.first_seen;
    el.dataset.last     = f.last_seen;

    const cs  = (f.callsign || '').trim() || 'вҖ”';
    const alt = ft2m(f.max_altitude);
    const spd = f.max_speed ? f.max_speed + ' СғР·' : 'вҖ”';

    el.innerHTML = `
        <input type="checkbox" class="fi-check" onclick="event.stopPropagation()">
        <div class="fi-color" style="background:${color}"></div>
        <div class="fi-body">
            <span class="fi-icao">${cs !== 'вҖ”' ? cs + ' В· ' : ''}${f.icao}</span>
            <div class="fi-time">${fmtTimeRange(f.first_seen, f.last_seen)}</div>
        </div>
    `;

    const cb = el.querySelector('.fi-check');
    cb.addEventListener('change', () => {
        if (cb.checked) addTrack(f, el, color);
        else            removeTrack(f.icao, el);
    });

    el.addEventListener('click', (e) => {
        if (e.target === cb) return;
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
        showInfo(f, color);
    });

    container.appendChild(el);
}

// в”Җв”Җ Add / Remove track в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function addTrack(f, el, color) {
    el.classList.add('active');
    if (activeTracks.has(f.icao)) return;

    try {
        const url = `/api/history?icao=${f.icao}&from=${encodeURIComponent(f.first_seen)}&to=${encodeURIComponent(f.last_seen)}&limit=10000`;
        const pts = await fetch(url).then(r => r.json());
        const valid = pts.filter(p => p.lat != null && p.lon != null);
        if (!valid.length) { el.querySelector('.fi-check').checked = false; el.classList.remove('active'); return; }

        const layers = [];
        for (let i = 1; i < valid.length; i++) {
            const p0 = valid[i - 1], p1 = valid[i];
            const seg = L.polyline([[p0.lat, p0.lon], [p1.lat, p1.lon]], {
                color, weight: 3, opacity: 0.9,
            });
            const alt = p1.altitude ? ft2m(p1.altitude) : 'вҖ”';
            const spd = p1.ground_speed ? p1.ground_speed + ' СғР·' : 'вҖ”';
            seg.bindTooltip(`${(f.callsign||f.icao).trim()}  вҶ‘ ${alt}  вһӨ ${spd}`, { sticky: true });
            layers.push(seg);
        }
        layers.push(L.circleMarker([valid[0].lat, valid[0].lon], {
            radius: 6, fillColor: '#00cc50', color, weight: 2, fillOpacity: 1
        }).bindTooltip('в–¶ ' + (f.callsign||f.icao).trim() + '  ' + fmtTime(f.first_seen)));
        const last = valid[valid.length - 1];
        layers.push(L.circleMarker([last.lat, last.lon], {
            radius: 6, fillColor: '#ff3300', color, weight: 2, fillOpacity: 1
        }).bindTooltip('в–  ' + (f.callsign||f.icao).trim() + '  ' + fmtTime(f.last_seen)));

        const layer = L.layerGroup(layers).addTo(map);
        activeTracks.set(f.icao, { layer, color, f, el, valid });
        fitAll();
        showInfo(f, color);
    } catch(e) {
        el.querySelector('.fi-check').checked = false;
        el.classList.remove('active');
    }
}

function removeTrack(icao, el) {
    const t = activeTracks.get(icao);
    if (t) { map.removeLayer(t.layer); activeTracks.delete(icao); }
    if (el) { el.classList.remove('active'); el.querySelector('.fi-check').checked = false; }
    if (activeTracks.size === 0) document.getElementById('infoPanel').style.display = 'none';
    else fitAll();
}

// в”Җв”Җ Bulk select в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function selectVisible() {
    document.querySelectorAll('.flight-item').forEach(el => {
        if (el.style.display === 'none') return;
        const cb = el.querySelector('.fi-check');
        if (!cb.checked) { cb.checked = true; cb.dispatchEvent(new Event('change')); }
    });
}

function clearAll() {
    activeTracks.forEach(t => map.removeLayer(t.layer));
    activeTracks.clear();
    document.querySelectorAll('.flight-item').forEach(el => {
        el.classList.remove('active');
        const cb = el.querySelector('.fi-check');
        if (cb) cb.checked = false;
    });
    document.getElementById('infoPanel').style.display = 'none';
}

// в”Җв”Җ Fit map to all active tracks в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function fitAll() {
    const all = [];
    activeTracks.forEach(t => t.valid.forEach(p => all.push([p.lat, p.lon])));
    if (all.length) map.fitBounds(L.latLngBounds(all), { padding: [50, 50] });
}

// в”Җв”Җ Info panel в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showInfo(f, color) {
    const cs = (f.callsign || '').trim() || f.icao;
    document.getElementById('ipCallsign').textContent = cs;
    document.getElementById('ipCallsign').style.color = color;
    document.getElementById('ipIcao').textContent     = f.icao;
    document.getElementById('ipFrom').textContent     = fmtTime(f.first_seen);
    document.getElementById('ipTo').textContent       = fmtTime(f.last_seen);
    document.getElementById('ipDur').textContent      = fmtDur(f.first_seen, f.last_seen);
    document.getElementById('ipPts').textContent      = f.points;
    document.getElementById('ipAlt').textContent      = ft2m(f.max_altitude);
    document.getElementById('ipSpd').textContent      = f.max_speed ? f.max_speed + ' СғР·' : 'вҖ”';
    document.getElementById('infoPanel').style.display = 'block';
}

// в”Җв”Җ Search filter в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function filterFlights() {
    const q = document.getElementById('searchInput').value.trim().toUpperCase();
    const items = document.querySelectorAll('.flight-item');
    let visible = 0;
    items.forEach(el => {
        const match = !q || el.dataset.callsign.includes(q) || el.dataset.icao.includes(q);
        el.style.display = match ? '' : 'none';
        if (match) visible++;
    });
    document.getElementById('flightCount').textContent =
        q ? `${visible} / ${items.length}` : items.length;
}
</script>
